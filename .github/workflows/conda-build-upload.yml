name: conda-build-upload
on:
  release:
    types: [published]
jobs:
  build-conda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install conda-build & anaconda-client
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          activate-environment: build
          channels: conda-forge
          miniforge-version: latest
      - shell: bash -l {0}
        run: |
          conda install -y conda-build anaconda-client pip
          conda build conda.recipe
          OUT=$(conda build conda.recipe --output)
          echo "CONDA_OUT=$OUT" >> $GITHUB_ENV
      - name: Upload to Anaconda.org
        if: env.CONDA_OUT != ''
        shell: bash -l {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          anaconda -t "$ANACONDA_API_TOKEN" upload "$CONDA_OUT" --label main
